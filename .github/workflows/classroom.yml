name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Tests unitaires
      id: tests-unitaires
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Tests unitaires
        setup-command: ''
        command: pip install -r requirements.txt -q && pytest tests/ -v --tb=short
        timeout: 10
        max-score: 0
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        TESTS-UNITAIRES_RESULTS: "${{steps.tests-unitaires.outputs.result}}"
      with:
        runners: tests-unitaires
